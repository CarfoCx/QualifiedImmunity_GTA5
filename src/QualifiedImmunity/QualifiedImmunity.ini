; Qualified Immunity — Layer 2 config. Goes in your game's scripts\ folder
; next to QualifiedImmunity.dll. Tweak freely; reload with the SHVDN hotkey.

[Grudge]
; How much "annoyance" before a cop goes hostile to you specifically.
AnnoyanceThreshold=100
; How fast that meter cools off per second when you behave.
AnnoyanceDecayRate=8

[Chaos]
; Master toggle for the spiciest behavior (shooting civilians). false = tamer.
EnableCivilianTargeting=true
; Per-decision chance an annoyed cop pops a nearby civilian. 0.0–1.0.
CivilianCollateralChance=0.06
; Chance a cop executes a surrendering/downed suspect instead of arresting.
ExecuteSurrenderingChance=0.85
; Seconds between taunt lines so it doesn't spam.
TauntCooldownSeconds=4

[Assault]
; If an NPC's vehicle hits a cop car (accident OR on purpose), nearby cops treat
; it as a hostile act and hunt the driver down. Player bumps are handled by the
; grudge meter above, not here.
EnableVehicleAssaultResponse=true
; If an NPC shoots, beats, or runs down an officer, every cop in the area treats
; that NPC as hostile and converges on them. (Player attacks still go through the
; grudge meter above.)
EnableOfficerAssaultResponse=true
; If an NPC vehicle runs a pedestrian down in view of the police, the cops treat
; the driver as hostile and pursue/kill them (a witnessed hit-and-run).
EnableWitnessedCrimeResponse=true
; Cops within this many meters of the incident respond.
ResponseRadius=60
; How long (seconds) the badges keep hunting the offending NPC.
ThreatMemorySeconds=30

[RideAlong]
; During a ride-along, walk up to a wounded (not dead) officer on foot and a
; prompt appears: press the on-screen key/button to apply a tourniquet and
; revive them. Works on keyboard (E) and controller (the matching button).
EnableTourniquet=true

[Bodies]
; Keep every body where it fell -- nothing despawns on its own. Each dead or
; fatally-wounded (bleeding-out) body gets an ambulance dispatched to pick it up:
; a paramedic loads it and the van hauls it off. Peds merely knocked down who will
; get back up are left alone. Set false to restore vanilla body cleanup.
KeepBodiesUntilAmbulance=true
; How many ambulances can be working bodies at once (more = bodies cleared faster).
MaxAmbulances=3
; Safety cap: if corpses pile up past this, the oldest un-serviced ones are
; released so the game's ped budget can't be exhausted (which would break spawns).
MaxPersistentBodies=48

[Keys]
; Key to flip off and provoke nearby cops on foot or in vehicle (default B)
ProvokeKey=B
; Key to request a police ride-along unit (default F9)
RequestRideAlongKey=F9
; Key to cancel the active ride-along (default F10)
CancelRideAlongKey=F10

[Pursuit]
; Percentage chance the suspect is probably innocent and runs in panic (0-100)
InnocentChance=35
; Odds threshold for Level 1 suspect threat (0-100)
Threat1Chance=45
; Odds threshold for Level 2 suspect threat (0-100)
Threat2Chance=35
; Seconds of delay before dispatching SWAT backup
SwatDelaySeconds=7.0
; Seconds of delay before dispatching Helicopter backup
HeliDelaySeconds=11.0
; Maximum number of SWAT backup waves to dispatch
MaxSwatWaves=3
; Maximum number of police backup units to call in
MaxBackupUnits=4
; Cooldown in seconds between SWAT backup dispatches
SwatIntervalSeconds=15.0
; Cooldown in seconds between general police backup dispatches
BackupIntervalSeconds=9.0
; Distance threshold in meters to attempt a PIT maneuver
PitDistanceThreshold=16.0
; Minimum speed of suspect vehicle (m/s) required to PIT
PitMinSpeed=7.0
; Cooldown in seconds between PIT attempts
PitCooldownSeconds=8.0
; Distance threshold in meters to bail out of the cruiser and engage on foot
EngageDistanceThreshold=38.0
; Speed threshold of suspect (m/s) to trigger foot engagement
EngageSpeedThreshold=11.0
; Ideal distance in meters the driver tries to maintain when chasing
IdealFollowDistance=16.0
; Distance in meters past which the suspect is considered escaping
EscapeDistance=160.0
; Continuous seconds the suspect must remain past escape distance to lose the cops
EscapeTimeLimit=25.0

